name: basira
description: "Inclusive bus companion app for SORETRAS network of Sfax"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^17.2.4

  # TTS / STT
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0

  # UI
  flutter_staggered_grid_view: ^0.7.0

  # Haptics - use Flutter built-in HapticFeedback
  # vibration replaced by flutter/services.dart HapticFeedback

  # HTTP / API
  dio: ^5.4.0
  csv: ^6.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Localization
  intl: any

  # Location
  geolocator: ^14.0.2

  # UI helpers
  flutter_slidable: ^4.0.0
  gap: ^3.0.1
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/sounds/
    - assets/icons/
    - assets/data/

    