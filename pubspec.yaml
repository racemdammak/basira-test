name: basira
description: "Inclusive bus companion app for SORETRAS network of Sfax"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Maps
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # TTS / STT
  flutter_tts: ^4.0.0
  speech_to_text: ^6.6.0

  # Haptics
  vibration: ^1.8.4

  # HTTP / API
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod: ^2.5.0

  # Localization
  intl: ^0.20.2

  # Background
  workmanager: ^0.5.2

  # Location
  geolocator: ^11.0.0

  # UI helpers
  flutter_slidable: ^3.0.0
  gap: ^3.0.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/sounds/
    - assets/icons/
